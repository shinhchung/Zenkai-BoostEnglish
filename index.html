<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>黑讀 English</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link id="appStylesheet" rel="stylesheet" href="./styles.css?v=2026-05-30-learning-cockpit-2" />
    <script>
      window.__BOOST_ENGLISH_BOOT_VERSION__ = "2026-05-30-learning-cockpit-2";

      (() => {
        const DEFAULT_VERSION = window.__BOOST_ENGLISH_BOOT_VERSION__;
        const VERSION_URL = "./version.json";
        let didBoot = false;

        const withVersion = (path, version) => {
          const separator = path.includes("?") ? "&" : "?";
          return `${path}${separator}v=${encodeURIComponent(version)}`;
        };

        const readVersion = (data) => String(data?.version || data?.sha || DEFAULT_VERSION).trim() || DEFAULT_VERSION;

        const loadApp = (version) => {
          const script = document.createElement("script");
          script.src = withVersion("./app.js", version);
          script.defer = true;
          document.body.append(script);
        };

        const boot = (version) => {
          if (didBoot) return;
          didBoot = true;
          window.__BOOST_ENGLISH_VERSION__ = version;
          const stylesheet = document.querySelector("#appStylesheet");
          if (stylesheet) stylesheet.href = withVersion("./styles.css", version);

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", () => loadApp(version), { once: true });
          } else {
            loadApp(version);
          }
        };

        const fallbackTimer = window.setTimeout(() => boot(DEFAULT_VERSION), 2500);
        fetch(`${VERSION_URL}?t=${Date.now()}`, { cache: "no-store" })
          .then((response) => response.ok ? response.json() : null)
          .then((data) => {
            window.clearTimeout(fallbackTimer);
            boot(readVersion(data));
          })
          .catch(() => {
            window.clearTimeout(fallbackTimer);
            boot(DEFAULT_VERSION);
          });
      })();
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="黑讀 English home">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 5.8c2.2-.9 4.3-.8 6.4.4v12c-2.1-1.2-4.2-1.3-6.4-.4V5.8Z" />
            <path d="M20 5.8c-2.2-.9-4.3-.8-6.4.4v12c2.1-1.2 4.2-1.3 6.4-.4V5.8Z" />
          </svg>
          <span>黑讀 English</span>
        </a>

        <button class="library-toggle" id="libraryToggle" type="button" aria-controls="articleLibrary" aria-expanded="false">
          文章
        </button>

        <nav class="nav-tabs" aria-label="主要學習區">
          <button class="nav-tab active" type="button" data-view="daily">
            <span class="icon book-icon" aria-hidden="true"></span>
            新聞聽力
          </button>
          <button class="nav-tab" type="button" data-view="vocab">
            <span class="icon grid-icon" aria-hidden="true"></span>
            生詞本
          </button>
          <button class="nav-tab" type="button" data-view="review">
            <span class="icon repeat-icon" aria-hidden="true"></span>
            復習
          </button>
        </nav>

        <div class="top-meta">
          <span id="todayLabel">載入中</span>
          <span class="streak">連續 <strong id="streakCount">1</strong> 天</span>
        </div>
      </header>

      <section class="mobile-session-bar" aria-label="目前學習控制">
        <button class="compact-control" id="prevSegmentButton" type="button" aria-label="上一句">‹</button>
        <div class="mobile-session-copy">
          <span id="mobileSegmentLabel">Segment 1</span>
          <strong id="mobileSegmentTitle">Loading...</strong>
        </div>
        <button class="compact-control play" id="mobilePlayButton" type="button" aria-label="播放目前句子">
          <span class="play-shape" aria-hidden="true"></span>
        </button>
        <button class="compact-control" id="nextSegmentButton" type="button" aria-label="下一句">›</button>
      </section>

      <main class="learning-layout">
        <aside class="library-panel" id="articleLibrary" aria-label="文章庫">
          <div class="library-head">
            <div>
              <h2>文章庫</h2>
              <p id="articleCount">0 篇英文</p>
            </div>
            <button class="drawer-close" id="libraryClose" type="button" aria-label="關閉文章列表">×</button>
          </div>
          <div class="article-list" id="articleList"></div>
        </aside>

        <section class="level-strip" aria-label="難度進程">
          <div class="level-label">難度等級</div>
          <div class="level-track" id="levelTrack"></div>
          <button class="ghost-button" id="adjustLevelButton" type="button">調整級別</button>
        </section>

        <section class="reader-panel" aria-labelledby="articleTitle">
          <div class="article-head">
            <div>
              <h1 id="articleTitle">Loading article...</h1>
              <div class="article-tags" id="articleTags"></div>
              <div class="source-line hidden" id="sourceLine"></div>
            </div>
            <button class="primary-icon-button" id="playArticleButton" type="button">
              <span class="play-shape" aria-hidden="true"></span>
              原聲連播
            </button>
          </div>

          <div class="source-video hidden" id="sourceVideo"></div>

          <div class="drill-board" id="drillBoard">
            <div class="drill-steps" id="drillSteps" aria-label="聽力練習步驟"></div>
            <div class="segment-focus">
              <div>
                <p class="kicker" id="segmentLabel">Segment 1</p>
                <h2 id="segmentTitle">Blind listening</h2>
              </div>
              <div class="segment-actions">
                <button class="tool-button" id="blindListenButton" type="button">
                  <span class="speaker-icon" aria-hidden="true"></span>
                  先聽唔睇字
                </button>
                <button class="tool-button" id="revealButton" type="button">顯示稿</button>
              </div>
            </div>
            <p class="transcript hidden" id="segmentTranscript"></p>
            <p class="translation hidden" id="segmentTranslation"></p>
            <div class="breakdown-list hidden" id="segmentBreakdown"></div>
          </div>

          <div class="sentence-list" id="sentenceList" aria-live="polite"></div>

          <div class="progress-row">
            <span>進度：<strong id="progressCount">0 / 0</strong> 句</span>
            <div class="progress-bar" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
            <span id="progressPercent">0%</span>
          </div>
        </section>

        <aside class="study-panel" aria-label="生字學習">
          <div class="panel-tabs" role="tablist">
            <button class="panel-tab" type="button" data-panel="saved">已儲存</button>
            <button class="panel-tab active" type="button" data-panel="words">生詞</button>
            <button class="panel-tab" type="button" data-panel="phrases">重點片語</button>
            <button class="panel-tab" type="button" data-panel="speaking">講</button>
            <button class="panel-tab" type="button" data-panel="dailyLife">美式</button>
            <button class="panel-tab" type="button" data-panel="notes">筆記</button>
          </div>
          <div id="wordList" class="word-list"></div>
        </aside>

        <section class="control-deck" aria-label="讀音同生詞控制">
          <div class="control-group">
            <label for="rateControl">播放速度</label>
            <select id="rateControl">
              <option value="0.75">0.75x</option>
              <option value="0.9">0.9x</option>
              <option value="1" selected>1.0x</option>
              <option value="1.15">1.15x</option>
            </select>
          </div>

          <div class="control-group voice-group">
            <label for="voiceControl">聲線</label>
            <div class="button-row voice-row">
              <select id="voiceControl">
                <option value="">偵測聲線中</option>
              </select>
              <button class="tool-button" id="voiceTestButton" type="button">試聲</button>
            </div>
            <small id="voiceHint">會優先使用較自然嘅英文聲線</small>
          </div>

          <div class="control-group">
            <span>聽讀跟讀</span>
            <div class="button-row">
              <button class="tool-button" id="repeatButton" type="button">
                <span class="speaker-icon" aria-hidden="true"></span>
                聽一次
              </button>
              <button class="tool-button" id="shadowButton" type="button">
                <span class="mic-icon" aria-hidden="true"></span>
                跟讀錄音
              </button>
            </div>
          </div>

          <div class="control-group">
            <span>生詞管理</span>
            <div class="button-row">
              <button class="tool-button" id="saveWordsButton" type="button">
                <span class="bookmark-icon" aria-hidden="true"></span>
                加入生詞本
              </button>
              <button class="tool-button" id="exportButton" type="button">Export JSON</button>
            </div>
          </div>

          <div class="next-level">
            <span>明日難度建議</span>
            <strong id="nextLevelLabel">B1（中級）</strong>
            <button class="accent-button" id="increaseButton" type="button">調整明日難度</button>
          </div>
        </section>
      </main>
      <div class="drawer-scrim hidden" id="drawerScrim" aria-hidden="true"></div>
      <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
    </div>

    <template id="sentenceTemplate">
      <button class="sentence-row" type="button">
        <span class="round-play"><span class="play-shape" aria-hidden="true"></span></span>
        <span class="sentence-number"></span>
        <span class="sentence-text"></span>
      </button>
    </template>

    <template id="wordTemplate">
      <article class="word-card">
        <div class="word-main">
          <button class="word-audio" type="button" aria-label="播放生字讀音">
            <span class="speaker-icon" aria-hidden="true"></span>
          </button>
          <div>
            <h2></h2>
            <p class="ipa"></p>
          </div>
        </div>
        <p class="meaning"></p>
        <p class="example"></p>
        <p class="translation"></p>
        <div class="word-foot">
          <span class="mastery"></span>
          <button class="save-word" type="button" aria-label="儲存生字">
            <span class="bookmark-icon" aria-hidden="true"></span>
          </button>
        </div>
      </article>
    </template>
    <noscript>
      <link rel="stylesheet" href="./styles.css" />
    </noscript>
  </body>
</html>
